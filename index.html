<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Geran Express – Маркетплейс</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --font: 'Inter', system-ui, -apple-system, sans-serif;
      --bg: #ffffff;
      --surface: #f7f7f9;
      --text-primary: #1a1a1a;
      --text-secondary: #6b7280;
      --text-tertiary: #9ca3af;
      --primary: #1e4a3b;
      --primary-soft: #e6f0eb;
      --accent-price: #f97316;
      --accent-heart: #ef4444;
      --border: #e5e7eb;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.06);
      --header-height: 56px;
      --nav-height: 64px;
      --radius-sm: 10px;
      --radius-md: 14px;
      --radius-lg: 18px;
      --transition: 0.2s cubic-bezier(0.2, 0, 0, 1);
    }

    body.dark {
      --bg: #111827;
      --surface: #1f2937;
      --text-primary: #f9fafb;
      --text-secondary: #d1d5db;
      --text-tertiary: #9ca3af;
      --primary: #34d399;
      --primary-soft: #064e3b;
      --border: #374151;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.3);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.5);
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text-primary);
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      -webkit-tap-highlight-color: transparent;
      margin: 0;
      transition: background 0.3s, color 0.3s;
    }

    #app {
      width: 100%;
      max-width: 1200px;
      min-height: 100vh;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
      box-shadow: 0 0 30px rgba(0,0,0,0.03);
    }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 4px; }

    /* ========== ИСПРАВЛЕННАЯ ШАПКА ========== */
    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      
      /* 1. Фон и рамка */
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      
      /* 2. Растягиваем на всю ширину */
      width: 100%;
      
      /* 3. Внутренние отступы и высота */
      padding: 0 16px;
      height: var(--header-height);
      
      /* 4. Flexbox для выравнивания:
         - display: flex делает контейнер гибким
         - align-items: center центрирует элементы по вертикали
         - justify-content: space-between прижимает логотип к левому краю,
           а блок с кнопками — к правому */
      display: flex;
      align-items: center;
      justify-content: space-between;
      
      /* 5. Эффект размытия фона (опционально) */
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    /* Логотип: ссылка с картинкой */
    .logo {
      /* Никаких лишних отступов, flex не растягивает */
      display: flex;
      align-items: center;
      
      /* Убираем подчеркивание ссылки */
      text-decoration: none;
      
      /* Не даем логотипу сжиматься, если места мало */
      flex-shrink: 0;
    }

    /* Картинка внутри логотипа */
    .logo img {
      /* Фиксированная высота, чтобы не ломать шапку */
      height: 38px;
      
      /* Ширина подстраивается автоматически по пропорциям */
      width: auto;
      
      /* Чтобы картинка не искажалась */
      object-fit: contain;
      
      /* Убираем возможные отступы */
      display: block;
    }

    /* Блок с кнопками действий (поиск, уведомления, профиль) */
    .header-actions {
      /* 1. Flex-контейнер для кнопок */
      display: flex;
      align-items: center;
      
      /* 2. Отступ между кнопками (gap) */
      gap: 8px;
      
      /* 3. КРИТИЧЕСКИ ВАЖНО:
         - Не даем блоку растягиваться */
      flex-shrink: 0;       /* Не сжиматься */
      flex-grow: 0;         /* Не расти */
      
      /* 4. Прижимаем к правому краю (уже сделано через space-between,
         но дублируем для надежности) */
      margin-left: auto;
    }

    /* Стилизация кнопок внутри header-actions */
    .header-actions button,
    .icon-btn {
      /* 1. Убираем дефолтные стили кнопок */
      background: transparent;
      border: none;
      outline: none;
      
      /* 2. Фиксированный размер, чтобы кнопки не растягивались */
      width: 40px;
      height: 40px;
      
      /* 3. Делаем круглые и центрируем иконку */
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      
      /* 4. Курсор-указатель для кликабельности */
      cursor: pointer;
      
      /* 5. Цвет иконок (наследуется или задается) */
      color: var(--text-secondary);
      
      /* 6. Плавный переход для hover-эффекта */
      transition: background var(--transition), color var(--transition);
      
      /* 7. Убираем возможные внутренние отступы */
      padding: 0;
      
      /* 8. Не даем кнопке растягиваться */
      flex-shrink: 0;
      
      /* 9. Позиционирование для бейджа (точки уведомлений) */
      position: relative;
    }

    /* Hover-эффект: легкий серый фон при наведении */
    .header-actions button:hover,
    .icon-btn:hover {
      background: var(--surface);
      color: var(--text-primary);
    }

    /* Размер иконок внутри кнопок */
    .header-actions button .material-symbols-rounded,
    .icon-btn .material-symbols-rounded {
      font-size: 22px;
      
      /* Иконка точно по центру */
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Бейдж (красная точка) для уведомлений */
    .badge-dot {
      position: absolute;
      top: 6px;
      right: 6px;
      width: 8px;
      height: 8px;
      background: var(--accent-heart);
      border-radius: 50%;
      border: 2px solid var(--bg);
    }

    /* ========== ОСТАЛЬНЫЕ СТИЛИ БЕЗ ИЗМЕНЕНИЙ ========== */

    .search-bar {
      flex: 1;
      display: flex;
      align-items: center;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 40px;
      padding: 8px 14px;
      gap: 6px;
      cursor: pointer;
      transition: background var(--transition);
      color: var(--text-secondary);
      margin: 0 12px; /* Добавил отступы, чтобы не прилипало к логотипу и кнопкам */
    }
    .search-bar:hover { background: var(--border); }
    .search-bar .material-symbols-rounded {
      font-size: 20px;
      color: var(--text-secondary);
    }
    .search-bar span {
      font-size: 0.9rem;
      color: var(--text-tertiary);
      font-weight: 400;
    }

    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      margin: 0 auto;
      max-width: 1200px;
      background: var(--bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding: 4px 0 calc(6px + env(safe-area-inset-bottom));
      height: var(--nav-height);
      z-index: 1000;
      transition: transform 0.2s;
      transform: translateY(0);
    }

    .bottom-nav.hidden {
      transform: translateY(100%);
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      color: var(--text-tertiary);
      cursor: pointer;
      padding: 6px 8px;
      border-radius: 16px;
      font-size: 0.65rem;
      font-weight: 500;
      transition: all var(--transition);
    }
    .nav-item .material-symbols-rounded { font-size: 24px; }
    .nav-item.active { color: var(--primary); }
    .nav-item.create-btn {
      background: var(--primary);
      color: white;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: -14px;
      box-shadow: 0 4px 10px rgba(30,74,59,0.25);
    }
    .nav-item.create-btn .material-symbols-rounded { font-size: 26px; }

    main {
      flex: 1;
      overflow-y: auto;
      padding: 0 12px 80px;
    }
    .screen {
      display: none;
      padding: 8px 0 16px;
      animation: fadeSlide 0.25s ease;
    }
    .screen.active { display: block; }

    #screen-login.active {
      display: flex;
      align-items: center;
      justify-content: center;
      height: calc(100vh - var(--header-height) - var(--nav-height));
    }

    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .categories-row {
      display: flex;
      overflow-x: auto;
      gap: 8px;
      padding: 10px 4px 6px;
      scrollbar-width: none;
      margin-bottom: 8px;
      white-space: nowrap;
    }
    .categories-row::-webkit-scrollbar { display: none; }
    .cat-chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 7px 14px;
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--text-secondary);
      transition: all var(--transition);
      cursor: pointer;
      box-shadow: var(--shadow-sm);
    }
    .cat-chip .material-symbols-rounded { font-size: 18px; }
    .cat-chip:hover { border-color: var(--primary); background: var(--primary-soft); }
    .cat-chip.active { background: var(--primary-soft); border-color: var(--primary); color: var(--primary); }

    .listings-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-top: 8px;
    }
    @media (min-width: 600px) { .listings-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (min-width: 900px) { .listings-grid { grid-template-columns: repeat(4, 1fr); } }
    @media (min-width: 1100px) { .listings-grid { grid-template-columns: repeat(5, 1fr); } }

    .card {
      background: var(--surface);
      border-radius: var(--radius-md);
      overflow: hidden;
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--border);
      transition: all var(--transition);
      cursor: pointer;
      display: flex;
      flex-direction: column;
    }
    .card:hover { box-shadow: var(--shadow-md); }

    .card-img {
      position: relative;
      width: 100%;
      aspect-ratio: 4 / 5;
      background: var(--border);
    }
    .card-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.3s;
    }
    .card:hover .card-img img { transform: scale(1.02); }

    .card-badge {
      position: absolute;
      top: 8px;
      left: 8px;
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(4px);
      color: white;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 0.65rem;
      font-weight: 600;
    }
    .card-heart {
      position: absolute;
      top: 8px;
      right: 8px;
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(4px);
      border-radius: 50%;
      width: 30px;
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: #aaa;
      transition: 0.2s;
      font-size: 18px;
    }
    .card-heart.liked { color: var(--accent-heart); }

    .card-body {
      padding: 10px 12px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    .card-price {
      font-weight: 700;
      font-size: 1.1rem;
      color: var(--accent-price);
      margin-bottom: 4px;
      line-height: 1.2;
    }
    .card-title {
      font-weight: 500;
      font-size: 0.85rem;
      color: var(--text-primary);
      line-height: 1.3;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-bottom: 6px;
      flex: 1;
    }
    .card-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.7rem;
      color: var(--text-tertiary);
      margin-top: auto;
    }
    .card-meta span {
      display: flex;
      align-items: center;
      gap: 2px;
    }

    .detail-img {
      width: 100%;
      max-height: 300px;
      object-fit: contain;
      border-radius: var(--radius-md);
      margin: 12px 0;
      background: var(--border);
    }
    .detail-actions {
      display: flex;
      gap: 10px;
      margin: 16px 0;
    }
    .btn {
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 30px;
      padding: 12px 20px;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      flex: 1;
      transition: background var(--transition);
    }
    .btn-outline {
      background: transparent;
      border: 1.5px solid var(--primary);
      color: var(--primary);
    }
    .btn:hover { filter: brightness(1.1); }

    .input-field {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid var(--border);
      border-radius: 14px;
      font-size: 0.95rem;
      margin-bottom: 12px;
      font-family: var(--font);
      background: var(--surface);
      color: var(--text-primary);
    }

    .stats-row {
      display: flex;
      gap: 8px;
      margin: 16px 0;
    }
    .stat-box {
      flex: 1;
      background: var(--surface);
      border-radius: var(--radius-md);
      padding: 12px 8px;
      text-align: center;
      font-weight: 600;
    }

    .toggle { position: relative; display: inline-block; width: 48px; height: 26px; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: #ccc; border-radius: 26px; transition: .4s; }
    .slider:before { content: ""; position: absolute; height: 20px; width: 20px; left: 3px; bottom: 3px; background: white; border-radius: 50%; transition: .4s; }
    input:checked + .slider { background: var(--primary); }
    input:checked + .slider:before { transform: translateX(22px); }
  </style>
</head>
<body>
<div id="app">
  <!-- ========== ИСПРАВЛЕННЫЙ HTML ШАПКИ ========== -->
  <header class="header" id="main-header">
    <!-- Логотип с картинкой -->
    <a href="/" class="logo">
      <img src="1.jpg" alt="Geran Express">
    </a>

    <!-- Поисковая строка (осталась как было) -->
    <div class="search-bar" id="search-trigger">
      <span class="material-symbols-rounded">search</span>
      <span>поиск</span>
    </div>

    <!-- Кнопки действий: строго справа, не растягиваются -->
    <div class="header-actions">
      <!-- Уведомления с бейджем -->
      <button class="icon-btn" id="notif-btn">
        <span class="material-symbols-rounded">notifications</span>
        <span class="badge-dot"></span>
      </button>
      <!-- Профиль -->
      <button class="icon-btn" id="profile-btn">
        <span class="material-symbols-rounded">person</span>
      </button>
    </div>
  </header>

  <!-- Остальной HTML без изменений -->
  <main id="main-content">
    <div id="screen-home" class="screen active"></div>
    <div id="screen-favorites" class="screen"><h2 style="margin:8px 0 12px">Избранное</h2><div id="favorites-container" class="listings-grid"></div></div>
    <div id="screen-my" class="screen"><h2 style="margin:8px 0 12px">Мои публикации</h2><div id="my-container"></div></div>
    <div id="screen-profile" class="screen">
      <div style="text-align:center;margin:20px 0">
        <div style="width:70px;height:70px;border-radius:50%;background:var(--primary-soft);margin:0 auto;display:flex;align-items:center;justify-content:center;font-size:2rem;">👤</div>
        <h3 id="profile-name" style="margin-top:8px">Иван Иванов</h3>
        <p style="color:var(--text-secondary)">+7 900 123-45-67</p>
      </div>
      <div class="stats-row">
        <div class="stat-box"><span id="stat-listings">0</span><br><small style="font-weight:400">объявлений</small></div>
        <div class="stat-box"><span id="stat-views">0</span><br><small style="font-weight:400">просмотров</small></div>
        <div class="stat-box"><span id="stat-favs">0</span><br><small style="font-weight:400">избранных</small></div>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;padding:14px 0;border-bottom:1px solid var(--border)">
        <span>Тёмная тема</span>
        <label class="toggle"><input type="checkbox" id="theme-checkbox"><span class="slider"></span></label>
      </div>
      <button class="btn btn-outline" style="margin-top:20px" id="logout-btn">Выйти</button>
    </div>
    <div id="screen-create" class="screen">
      <h2 style="margin:4px 0 12px">Новое объявление</h2>
      <input class="input-field" id="create-title" placeholder="Название">
      <textarea class="input-field" id="create-desc" placeholder="Описание" rows="3"></textarea>
      <select class="input-field" id="create-category">
        <option value="Электроника">Электроника</option><option value="Одежда">Одежда</option><option value="Авто">Авто</option><option value="Услуги">Услуги</option><option value="Другое">Другое</option>
      </select>
      <input class="input-field" id="create-price" placeholder="Цена (₽)" type="number">
      <input class="input-field" id="create-phone" placeholder="Телефон">
      <button class="btn" id="submit-create">Опубликовать</button>
    </div>
    <div id="screen-detail" class="screen"><span class="material-symbols-rounded" id="back-detail" style="cursor:pointer;font-size:28px;margin-bottom:8px;display:inline-block">arrow_back</span><div id="detail-content"></div></div>
    <div id="screen-search" class="screen">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:16px">
        <span class="material-symbols-rounded" id="back-search" style="cursor:pointer">arrow_back</span>
        <input class="input-field" id="search-input" placeholder="Поиск по названию..." autofocus style="flex:1;margin-bottom:0">
      </div>
      <div id="search-results" class="listings-grid"></div>
    </div>
    <div id="screen-login" class="screen">
      <div style="text-align:center;width:100%">
        <h1 style="color:var(--primary)">🌿 Geran Express</h1>
        <p style="margin:12px 0 32px;color:var(--text-secondary)">Покупайте и продавайте рядом</p>
        <input class="input-field" id="login-phone" placeholder="+7 (900) 123-45-67">
        <button class="btn" id="login-btn" style="width:100%">Войти</button>
      </div>
    </div>
  </main>

  <nav class="bottom-nav" id="bottom-nav">
    <div class="nav-item active" data-tab="home"><span class="material-symbols-rounded">home</span><span>Главная</span></div>
    <div class="nav-item" data-tab="favorites"><span class="material-symbols-rounded">favorite</span><span>Избранное</span></div>
    <div class="nav-item create-btn" data-tab="create"><span class="material-symbols-rounded">add</span></div>
    <div class="nav-item" data-tab="my"><span class="material-symbols-rounded">list_alt</span><span>Публикации</span></div>
    <div class="nav-item" data-tab="profile"><span class="material-symbols-rounded">person</span><span>Профиль</span></div>
  </nav>
</div>

<!-- Скрипт без изменений -->
<script>
  (() => {
    // ---------- Состояние ----------
    const state = {
      user: JSON.parse(localStorage.getItem('geran_user')) || null,
      listings: JSON.parse(localStorage.getItem('geran_listings')) || [],
      favorites: JSON.parse(localStorage.getItem('geran_favorites')) || [],
      currentScreen: 'home',
      editId: null,
      searchQuery: '',
      activeCategory: null
    };

    if (!state.listings.length) {
      state.listings = [
        {
          id: '1',
          title: 'Смартфон Samsung Galaxy A54',
          desc: 'Отличное состояние, полный комплект, коробка.',
          price: 18000,
          isFree: false,
          category: 'Электроника',
          phone: '+7 999 123-45-67',
          village: 'Дехай Геран',
          images: ['https://picsum.photos/id/1/400/500'],
          date: Date.now() - 1000000,
          userId: 'demo',
          views: 12,
          isVIP: false
        },
        {
          id: '2',
          title: 'Ноутбук Lenovo IdeaPad 3',
          desc: '15.6", Ryzen 5, 8GB RAM, SSD 256GB. Для учёбы и работы.',
          price: 32000,
          isFree: false,
          category: 'Компьютеры',
          phone: '+7 999 234-56-78',
          village: 'Дехай Геран',
          images: ['https://picsum.photos/id/2/400/500'],
          date: Date.now() - 2000000,
          userId: 'demo',
          views: 28,
          isVIP: true
        },
        {
          id: '3',
          title: 'Дрель электрическая Makita',
          desc: 'Мощная, с регулировкой оборотов. Была в использовании пару раз.',
          price: 4500,
          isFree: false,
          category: 'Инструменты',
          phone: '+7 999 345-67-89',
          village: 'Дехай Геран',
          images: ['https://picsum.photos/id/3/400/500'],
          date: Date.now() - 3000000,
          userId: 'demo',
          views: 8,
          isVIP: false
        },
        {
          id: '4',
          title: 'Диван угловой раскладной',
          desc: 'Ткань серого цвета, удобный, есть ящик для белья.',
          price: 22000,
          isFree: false,
          category: 'Недвижимость',
          phone: '+7 999 456-78-90',
          village: 'Дехай Геран',
          images: ['https://picsum.photos/id/4/400/500'],
          date: Date.now() - 5000000,
          userId: 'demo',
          views: 41,
          isVIP: false
        },
        {
          id: '5',
          title: 'Куртка зимняя мужская',
          desc: 'Размер L, носилась один сезон, состояние отличное.',
          price: 5000,
          isFree: false,
          category: 'Одежда',
          phone: '+7 999 567-89-01',
          village: 'Дехай Геран',
          images: ['https://picsum.photos/id/5/400/500'],
          date: Date.now() - 7000000,
          userId: 'demo',
          views: 17,
          isVIP: false
        }
      ];
      localStorage.setItem('geran_listings', JSON.stringify(state.listings));
    }

    const save = () => {
      localStorage.setItem('geran_listings', JSON.stringify(state.listings));
      localStorage.setItem('geran_favorites', JSON.stringify(state.favorites));
    };

    const screens = {
      home: document.getElementById('screen-home'),
      favorites: document.getElementById('screen-favorites'),
      my: document.getElementById('screen-my'),
      profile: document.getElementById('screen-profile'),
      create: document.getElementById('screen-create'),
      detail: document.getElementById('screen-detail'),
      search: document.getElementById('screen-search'),
      login: document.getElementById('screen-login'),
    };
    const bottomNav = document.getElementById('bottom-nav');
    const mainHeader = document.getElementById('main-header');

    function updateNavVisibility(screenId) {
      if (screenId === 'login') {
        bottomNav.classList.add('hidden');
      } else {
        bottomNav.classList.remove('hidden');
      }
    }

    function setActiveNavTab(screenId) {
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
      const navItem = document.querySelector(`.nav-item[data-tab="${screenId}"]`);
      if (navItem) navItem.classList.add('active');
    }

    function showScreen(id) {
      if (id === 'profile' && !state.user) {
        id = 'login';
      }

      Object.values(screens).forEach(s => s.classList.remove('active'));
      if (screens[id]) screens[id].classList.add('active');
      state.currentScreen = id;

      mainHeader.style.display = (id === 'login') ? 'none' : 'flex';

      updateNavVisibility(id);
      setActiveNavTab(id);
      renderScreen(id);
    }

    function renderScreen(id) {
      switch (id) {
        case 'home': renderHome(); break;
        case 'favorites': renderFavorites(); break;
        case 'my': renderMy(); break;
        case 'profile': renderProfile(); break;
        case 'search': renderSearch(); break;
      }
    }

    function cardHTML(l) {
      const liked = state.favorites.includes(l.id);
      const priceText = l.isFree ? 'Бесплатно' : `${l.price.toLocaleString()} ₽`;
      const img = l.images?.[0] || 'https://picsum.photos/400/500';
      const vipBadge = l.isVIP ? '<div class="card-badge" style="background:#1e4a3b;">VIP</div>' : '';
      return `
        <div class="card" onclick="window._openDetail('${l.id}')">
          <div class="card-img">
            <img src="${img}" alt="">
            ${vipBadge}
            <div class="card-heart ${liked?'liked':''}" onclick="event.stopPropagation(); window._toggleFav('${l.id}')">
              <span class="material-symbols-rounded">${liked ? 'favorite' : 'favorite'}</span>
            </div>
          </div>
          <div class="card-body">
            <div class="card-price">${priceText}</div>
            <div class="card-title">${l.title}</div>
            <div class="card-meta">
              <span>📍 ${l.village || 'Дехай Геран'}</span>
              <span>${new Date(l.date).toLocaleDateString()}</span>
              <span><span class="material-symbols-rounded" style="font-size:14px">visibility</span>${l.views||0}</span>
            </div>
          </div>
        </div>`;
    }

    function renderCategories() {
      const categories = ['Электроника','Компьютеры','Бытовая техника','Авто','Мото','Недвижимость','Инструменты','Запчасти','Одежда','Игры','Книги','Детские','Животные','Работа','Услуги','Разное'];
      const icons = {
        'Электроника':'smartphone', 'Компьютеры':'computer', 'Бытовая техника':'tv', 'Авто':'directions_car',
        'Мото':'two_wheeler', 'Недвижимость':'home', 'Инструменты':'build', 'Запчасти':'build_circle',
        'Одежда':'checkroom', 'Игры':'sports_esports', 'Книги':'book', 'Детские':'child_care',
        'Животные':'pets', 'Работа':'work', 'Услуги':'handyman', 'Разное':'category'
      };
      let html = '<div class="categories-row">';
      html += `<div class="cat-chip ${!state.activeCategory ? 'active' : ''}" onclick="window._clearCategory()">
        <span class="material-symbols-rounded">apps</span> Все
      </div>`;
      categories.forEach(cat => {
        html += `<div class="cat-chip ${state.activeCategory === cat ? 'active' : ''}" onclick="window._filterCategory('${cat}')">
          <span class="material-symbols-rounded">${icons[cat] || 'label'}</span> ${cat}
        </div>`;
      });
      html += '</div>';
      return html;
    }

    function renderHome() {
      let filtered = state.listings.filter(l => l.isActive !== false);
      if (state.activeCategory) {
        filtered = filtered.filter(l => l.category === state.activeCategory);
      }
      const gridHtml = filtered.length ? filtered.map(cardHTML).join('') : '<p style="padding:20px;text-align:center;">Нет объявлений</p>';
      screens.home.innerHTML = renderCategories() + `<div class="listings-grid">${gridHtml}</div>`;
    }

    window._filterCategory = (cat) => {
      state.activeCategory = cat;
      renderHome();
      window.scrollTo(0, 0);
    };

    window._clearCategory = () => {
      state.activeCategory = null;
      renderHome();
      window.scrollTo(0, 0);
    };

    function renderFavorites() {
      const favs = state.listings.filter(l => state.favorites.includes(l.id));
      document.getElementById('favorites-container').innerHTML = favs.length ? favs.map(cardHTML).join('') : '<p>Нет избранных</p>';
    }

    function renderMy() {
      const my = state.listings.filter(l => l.userId === (state.user?.uid || ''));
      document.getElementById('my-container').innerHTML = my.length ? my.map(l => `
        <div class="card" style="padding:14px;margin-bottom:10px">
          <b>${l.title}</b> - ${l.isFree?'Бесплатно':l.price.toLocaleString()+' ₽'}
          <div style="margin-top:8px;display:flex;gap:8px">
            <button class="btn btn-outline" style="flex:0;padding:8px 12px" onclick="window._editListing('${l.id}')">✏️</button>
            <button class="btn btn-outline" style="flex:0;padding:8px 12px;color:red;border-color:red" onclick="window._deleteListing('${l.id}')">🗑️</button>
            <span style="margin-left:auto">👁 ${l.views}</span>
          </div>
        </div>`).join('') : '<p>Нет публикаций</p>';
    }

    function renderProfile() {
      if (!state.user) {
        showScreen('login');
        return;
      }
      document.getElementById('profile-name').textContent = state.user?.name || 'Пользователь';
      const my = state.listings.filter(l => l.userId === (state.user?.uid || ''));
      document.getElementById('stat-listings').textContent = my.length;
      document.getElementById('stat-views').textContent = my.reduce((acc,l)=>acc+(l.views||0),0);
      document.getElementById('stat-favs').textContent = state.favorites.length;
    }

    window._openDetail = (id) => {
      const l = state.listings.find(x => x.id === id);
      if (!l) return;
      document.getElementById('detail-content').innerHTML = `
        <img src="${l.images?.[0] || 'https://picsum.photos/400/500'}" class="detail-img">
        <h2>${l.title}</h2>
        <h3 style="color:var(--accent-price);font-size:1.6rem">${l.isFree?'Бесплатно':l.price.toLocaleString()+' ₽'}</h3>
        <p style="margin:10px 0">${l.desc}</p>
        <p>📍 ${l.village || 'Дехай Геран'} · ${l.category}</p>
        <div class="detail-actions">
          <button class="btn" onclick="alert('Звонок на ${l.phone}')"><span class="material-symbols-rounded">call</span>Позвонить</button>
          <button class="btn btn-outline" onclick="window._toggleFav('${l.id}');window._openDetail('${l.id}')"><span class="material-symbols-rounded">${state.favorites.includes(l.id)?'favorite':'favorite'}</span></button>
        </div>`;
      showScreen('detail');
    };

    function renderSearch() {
      const q = state.searchQuery.toLowerCase();
      const results = state.listings.filter(l => l.title.toLowerCase().includes(q));
      document.getElementById('search-results').innerHTML = results.length ? results.map(cardHTML).join('') : '<p>Ничего не найдено</p>';
    }

    window._toggleFav = (id) => {
      if (!state.user) return alert('Войдите, чтобы добавлять в избранное');
      if (state.favorites.includes(id)) {
        state.favorites = state.favorites.filter(f => f !== id);
      } else {
        state.favorites.push(id);
      }
      save();
      renderScreen(state.currentScreen);
    };

    window._editListing = (id) => {
      const l = state.listings.find(x => x.id === id);
      if (!l) return;
      state.editId = id;
      document.getElementById('create-title').value = l.title;
      document.getElementById('create-desc').value = l.desc;
      document.getElementById('create-category').value = l.category;
      document.getElementById('create-price').value = l.price;
      document.getElementById('create-phone').value = l.phone;
      showScreen('create');
    };

    window._deleteListing = (id) => {
      if (confirm('Удалить объявление?')) {
        state.listings = state.listings.filter(l => l.id !== id);
        save();
        renderMy();
      }
    };

    window.addMyProduct = ({ title, desc, price, category, phone, images = [] }) => {
      if (!title || !phone) {
        console.error('addMyProduct: title и phone обязательны');
        return;
      }
      const newListing = {
        id: 'manual_' + Date.now(),
        title,
        desc: desc || '',
        price: Number(price) || 0,
        isFree: price === 0,
        category: category || 'Разное',
        phone,
        images: images.length ? images : ['https://picsum.photos/400/500'],
        village: 'Дехай Геран',
        date: Date.now(),
        userId: state.user?.uid || 'anonymous',
        views: 0,
        isActive: true,
        isVIP: false
      };
      state.listings.unshift(newListing);
      save();
      if (state.currentScreen === 'home' || state.currentScreen === 'favorites') {
        renderScreen(state.currentScreen);
      }
      console.log('✅ Товар добавлен:', newListing);
    };

    document.getElementById('submit-create').addEventListener('click', () => {
      const title = document.getElementById('create-title').value.trim();
      const phone = document.getElementById('create-phone').value.trim();
      if (!title || !phone) return alert('Заполните название и телефон');
      const data = {
        id: state.editId || 'id_'+Date.now(),
        title,
        desc: document.getElementById('create-desc').value,
        category: document.getElementById('create-category').value,
        price: parseInt(document.getElementById('create-price').value) || 0,
        isFree: false,
        phone,
        village: 'Дехай Геран',
        images: ['https://picsum.photos/400/500'],
        date: Date.now(),
        userId: state.user?.uid || 'demo',
        views: 0,
        isActive: true,
        isVIP: false
      };
      if (state.editId) {
        const idx = state.listings.findIndex(l => l.id === state.editId);
        if (idx !== -1) state.listings[idx] = { ...state.listings[idx], ...data };
        state.editId = null;
      } else {
        state.listings.unshift(data);
      }
      save();
      showScreen('home');
    });

    document.getElementById('search-trigger').addEventListener('click', () => showScreen('search'));
    document.getElementById('back-search').addEventListener('click', () => showScreen('home'));
    document.getElementById('back-detail').addEventListener('click', () => showScreen('home'));
    document.getElementById('notif-btn').addEventListener('click', () => alert('Уведомления'));
    document.getElementById('profile-btn').addEventListener('click', () => showScreen('profile'));
    document.getElementById('logout-btn').addEventListener('click', () => {
      localStorage.removeItem('geran_user');
      state.user = null;
      showScreen('login');
    });
    document.getElementById('login-btn').addEventListener('click', () => {
      const phone = document.getElementById('login-phone').value.trim();
      if (phone) {
        state.user = { uid: 'user_'+Date.now(), phone, name: 'Пользователь' };
        localStorage.setItem('geran_user', JSON.stringify(state.user));
        showScreen('home');
      }
    });

    const themeCheckbox = document.getElementById('theme-checkbox');
    themeCheckbox?.addEventListener('change', e => {
      document.body.classList.toggle('dark', e.target.checked);
      localStorage.setItem('geran_dark', e.target.checked);
    });

    document.getElementById('search-input').addEventListener('input', e => {
      state.searchQuery = e.target.value;
      renderSearch();
    });

    document.querySelectorAll('.nav-item').forEach(item => {
      item.addEventListener('click', (e) => {
        const tab = item.dataset.tab;
        if (tab) showScreen(tab);
      });
    });

    if (localStorage.getItem('geran_dark') === 'true') {
      document.body.classList.add('dark');
      themeCheckbox.checked = true;
    }

    if (state.user) {
      showScreen('home');
    } else {
      showScreen('login');
    }
  })();
</script>
</body>
</html>
